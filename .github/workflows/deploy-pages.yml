name: Deploy landing site to GitHub Pages

on:
  # Manual-only: deploy from the Actions tab ("Run workflow") to avoid
  # email notifications on every push. Re-add a `push:` trigger to restore
  # automatic deploys.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build clean deploy folder
        run: |
          mkdir -p _deploy
          cp landing/vr-showcase.html _deploy/index.html
          cp -r landing/img _deploy/img

      - name: Upload deploy folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
